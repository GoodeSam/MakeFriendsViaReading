services:
  postgres:
    image: postgres:16
    container_name: mfvr-postgres
    environment:
      POSTGRES_USER: mfvr
      POSTGRES_PASSWORD: mfvr_dev
      POSTGRES_DB: mfvr
    ports:
      - "5432:5432"
    volumes:
      - mfvr_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mfvr"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mfvr_pgdata:
